<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Percently</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

    <div class="calculator">

        <h1>🚀 Percently</h1>

        <h5 class="text-muted">
            Calculate percentages instantly
        </h5>

        <p class="text-muted">

            Fast • Free • Percentage Calculator

        </p>

        <div class="row mt-4">

            <div class="col">

                <input
                        id="percentage"
                        type="number"
                        class="form-control"
                        placeholder="%">

            </div>

            <div class="col-auto">

                <h3>% of</h3>

            </div>

            <div class="col">

                <input
                        id="number"
                        type="number"
                        class="form-control"
                        placeholder="Number">

            </div>

        </div>

        <button
                class="btn btn-primary mt-4"
                id="calculate">

            Calculate

        </button>

        <h2 class="mt-5">

            Answer

        </h2>

        <h1 id="answer">

            0

        </h1>

    </div>

</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
